name: "Test workflow"
run-name: "Test workflow [${{ github.ref_name }}] ${{ github.event.repository.pushed_at}}"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-quality-check:
    runs-on: ubuntu-22.04
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies and project
        run: |
          uv sync --group dev --group backend

      - name: Run pre-commit hooks
        run: |
          uv run pre-commit install
          uv run pre-commit run --all-files

      - name: Run unit tests
        run: |
          echo "Launching unit tests"
          uv run pytest tests/test_unitaires

  integration-tests-kind:
    runs-on: ubuntu-22.04
    environment: dev
    needs: test-and-quality-check
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --group dev --group backend --group cli

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create Kind cluster
        run: |
          kind create cluster --name model-platform-ci --wait 60s

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Verify cluster is running
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Install ingress-nginx controller for Kind
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=90s

      - name: Deploy infrastructure (namespaces, minio, nginx, ingress)
        run: |
          kubectl apply -f infrastructure/k8s/namespaces.yaml
          kubectl apply -f infrastructure/k8s/minio-deployment.yaml
          kubectl apply -f infrastructure/k8s/nginx-deployment.yaml
          kubectl apply -f infrastructure/k8s/nginx-configmap.yaml
          kubectl apply -f infrastructure/k8s/ingress.yaml
          kubectl wait --for=condition=available deployment/nginx-reverse-proxy --timeout=120s || true

      - name: Deploy backend
        run: |
          kubectl apply -f infrastructure/k8s/backend-configmap.yaml
          kubectl create secret generic backend-secret \
            --namespace=model-platform \
            --from-literal=POSTGRES_PASSWORD='test_password' \
            --from-literal=JWT_SECRET='test_jwt_secret_for_ci' \
            --from-literal=ADMIN_EMAIL='admin@test.com' \
            --from-literal=ADMIN_PASSWORD='test_admin_password'
          kubectl apply -f infrastructure/k8s/backend-deployment.yaml
          kubectl wait --for=condition=available deployment/backend -n model-platform --timeout=180s
          echo "Backend deployed, checking pods..."
          kubectl get pods -n model-platform

      - name: Run Kind integration tests (minimal infrastructure tests)
        run: |
          echo "Launching Kind integration tests"
          uv run pytest tests/integration/test_minimal_kind.py -v --tb=short

      - name: Delete Kind cluster
        if: always()
        run: |
          kind delete cluster --name model-platform-ci

  integration-tests-minikube:
    runs-on: ubuntu-22.04
    environment: dev
    needs: test-and-quality-check
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --group dev --group backend --group cli --group notebooks

      - name: Start Minikube
        uses: medyagh/setup-minikube@v0.0.18
        with:
          minikube-version: '1.32.0'
          kubernetes-version: 'v1.28.3'
          driver: docker
          memory: 4096
          cpus: 2

      - name: Enable Minikube addons
        run: |
          minikube addons enable ingress
          minikube addons enable ingress-dns
          # Wait for ingress controller to be ready
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s

      - name: Verify Minikube is running
        run: |
          minikube status
          kubectl cluster-info
          kubectl get nodes

      - name: Setup /etc/hosts for model-platform.com
        run: |
          echo "$(minikube ip) model-platform.com" | sudo tee -a /etc/hosts

      - name: Deploy infrastructure
        run: |
          kubectl apply -f infrastructure/k8s/namespaces.yaml
          kubectl apply -f infrastructure/k8s/minio-deployment.yaml
          # Apply configmap BEFORE deployment so nginx can start correctly
          kubectl apply -f infrastructure/k8s/nginx-configmap.yaml
          kubectl apply -f infrastructure/k8s/nginx-deployment.yaml
          kubectl apply -f infrastructure/k8s/ingress.yaml
          # Wait for nginx to be ready with retries
          for i in {1..3}; do
            kubectl wait --for=condition=available deployment/nginx-reverse-proxy --timeout=60s && break
            echo "Retry $i: nginx not ready yet, checking pod status..."
            kubectl get pods -l app=nginx-reverse-proxy
            kubectl describe deployment nginx-reverse-proxy
            sleep 10
          done

      - name: Run integration tests
        run: |
          echo "Launching Minikube integration tests"
          uv run pytest tests/integration/ -v --tb=short -m "not slow"

      - name: Stop Minikube
        if: always()
        run: |
          minikube stop

  e2e-tests-minikube:
    runs-on: ubuntu-22.04
    environment: dev
    needs: [test-and-quality-check, integration-tests-kind]
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --group dev --group backend --group cli --group notebooks

      - name: Start Minikube
        uses: medyagh/setup-minikube@v0.0.18
        with:
          minikube-version: '1.32.0'
          kubernetes-version: 'v1.28.3'
          driver: docker
          memory: 6144
          cpus: 4

      - name: Enable Minikube addons
        run: |
          minikube addons enable ingress
          minikube addons enable ingress-dns
          # Wait for ingress controller to be ready
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s

      - name: Setup /etc/hosts for model-platform.com
        run: |
          echo "$(minikube ip) model-platform.com" | sudo tee -a /etc/hosts

      - name: Deploy full infrastructure
        run: |
          # Network config - apply configmap BEFORE deployment
          kubectl apply -f infrastructure/k8s/namespaces.yaml
          kubectl apply -f infrastructure/k8s/minio-deployment.yaml
          kubectl apply -f infrastructure/k8s/nginx-configmap.yaml
          kubectl apply -f infrastructure/k8s/nginx-deployment.yaml
          kubectl apply -f infrastructure/k8s/ingress.yaml

          # PostgreSQL
          kubectl create namespace pgsql --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f infrastructure/k8s/pg-init-schemas.yaml
          kubectl apply -f infrastructure/k8s/pgsql-deployment.yaml
          kubectl apply -f infrastructure/k8s/pgsql-init-job.yaml

          # Wait for nginx with retries
          for i in {1..3}; do
            kubectl wait --for=condition=available deployment/nginx-reverse-proxy --timeout=60s && break
            echo "Retry $i: nginx not ready yet..."
            kubectl get pods -l app=nginx-reverse-proxy
            sleep 10
          done

          # Backend
          kubectl apply -f infrastructure/k8s/backend-configmap.yaml
          kubectl create secret generic backend-secret \
            --namespace=model-platform \
            --from-literal=POSTGRES_PASSWORD='test_password' \
            --from-literal=JWT_SECRET='test_jwt_secret_for_ci' \
            --from-literal=ADMIN_EMAIL='admin@test.com' \
            --from-literal=ADMIN_PASSWORD='test_admin_password'
          kubectl apply -f infrastructure/k8s/backend-deployment.yaml
          kubectl wait --for=condition=available deployment/backend -n model-platform --timeout=300s

      - name: Wait for infrastructure to be ready
        run: |
          echo "Waiting for services to be fully operational..."
          sleep 60
          kubectl get pods --all-namespaces
          curl -f http://model-platform.com/health || echo "Health check pending"

      - name: Run end-to-end tests
        run: |
          echo "Launching end-to-end tests"
          uv run pytest tests/tests_end_to_end/test_from_project_creation_to_model_predict.py -v --tb=long

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Pod logs ==="
          kubectl logs -n model-platform -l app=backend --tail=100 || true
          echo "=== Events ==="
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' | tail -50 || true

      - name: Stop Minikube
        if: always()
        run: |
          minikube stop
